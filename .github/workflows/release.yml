name: Build & Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  packages: write

jobs:
  build-all-platforms:
    runs-on: mac-mini-org-heart

    outputs:
      version: ${{ steps.buildvars.outputs.version }}
      commit: ${{ steps.buildvars.outputs.commit }}
      build_time: ${{ steps.buildvars.outputs.time }}

    steps:
      - name: Checkout tag
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.ref }}

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.24"
          cache: false

      - name: Set build variables
        id: buildvars
        run: |
          echo "version=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          echo "time=$(date -u '+%Y-%m-%d %H:%M:%S')" >> $GITHUB_OUTPUT
          echo "commit=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Cross-compile all platforms in parallel
        env:
          VERSION: ${{ steps.buildvars.outputs.version }}
          GIT_STATE: clean
          COMMIT: ${{ steps.buildvars.outputs.commit }}
          BUILD_TIME: ${{ steps.buildvars.outputs.time }}
        run: |
          make cross-compile
          ls -la dist/

      - name: Compress binaries
        run: |
          cd dist
          cp anytype-darwin-amd64 anytype && tar czf "../anytype-cli-${{ steps.buildvars.outputs.version }}-darwin-amd64.tar.gz" anytype && rm anytype
          cp anytype-darwin-arm64 anytype && tar czf "../anytype-cli-${{ steps.buildvars.outputs.version }}-darwin-arm64.tar.gz" anytype && rm anytype
          cp anytype-windows-amd64.exe anytype.exe && zip "../anytype-cli-${{ steps.buildvars.outputs.version }}-windows-amd64.zip" anytype.exe && rm anytype.exe
          cp anytype-linux-amd64 anytype && tar czf "../anytype-cli-${{ steps.buildvars.outputs.version }}-linux-amd64.tar.gz" anytype && rm anytype
          cp anytype-linux-arm64 anytype && tar czf "../anytype-cli-${{ steps.buildvars.outputs.version }}-linux-arm64.tar.gz" anytype && rm anytype
          cd ..
          ls -la anytype-cli-*

      - name: Upload artifacts
        uses: actions/upload-artifact@v6
        with:
          name: anytype-cli-releases
          path: |
            anytype-cli-*.tar.gz
            anytype-cli-*.zip

  create_release:
    needs: build-all-platforms
    runs-on: ubuntu-latest

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v7
        with:
          name: anytype-cli-releases
          path: artifacts

      - name: List artifacts
        run: ls -la artifacts/

      - name: Create Release & Upload Assets
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          files: artifacts/anytype-cli-*
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, '-rc') }}
          token: ${{ secrets.GITHUB_TOKEN }}

  push-docker-image:
    name: Build Docker image and push to registry
    needs:
      - build-all-platforms
      - create_release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.ref }}

      - name: Set deploy-platforms
        run: |
          echo "DEPLOY_PLATFORMS=linux/amd64,linux/arm64" >> $GITHUB_ENV

      - name: Normalization of the release version
        id: release-version
        shell: bash
        run: |
          tag="${{ github.ref_name }}"
          ver="${tag#v}"
          echo "RELEASE_VERSION=${ver}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push to GitHub Container Registry
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: ${{ env.DEPLOY_PLATFORMS }}
          push: true
          build-args: |
            VERSION=${{ needs.build-all-platforms.outputs.version }}
            COMMIT=${{ needs.build-all-platforms.outputs.commit }}
            BUILD_TIME=${{ needs.build-all-platforms.outputs.build_time }}
            GIT_STATE=clean
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.ref_name }}
            ghcr.io/${{ github.repository }}:v${{ steps.release-version.outputs.RELEASE_VERSION }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.description=Anytype CLI - Command-line interface for Anytype with embedded gRPC server
            org.opencontainers.image.licenses=MIT
            org.opencontainers.image.version=${{ steps.release-version.outputs.RELEASE_VERSION }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push to Docker Hub
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: ${{ env.DEPLOY_PLATFORMS }}
          push: true
          build-args: |
            VERSION=${{ needs.build-all-platforms.outputs.version }}
            COMMIT=${{ needs.build-all-platforms.outputs.commit }}
            BUILD_TIME=${{ needs.build-all-platforms.outputs.build_time }}
            GIT_STATE=clean
          tags: |
            docker.io/${{ github.repository }}:latest
            docker.io/${{ github.repository }}:${{ github.ref_name }}
            docker.io/${{ github.repository }}:v${{ steps.release-version.outputs.RELEASE_VERSION }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.description=Anytype CLI - Command-line interface for Anytype with embedded gRPC server
            org.opencontainers.image.licenses=MIT
            org.opencontainers.image.version=${{ steps.release-version.outputs.RELEASE_VERSION }}
            org.opencontainers.image.revision=${{ github.sha }}

